{% extends "base.html" %}

{% block content %}

<h2>LLM Table Cleaning Decision</h2>

<form method="POST">

{% csrf_token %}

<label>Tables (comma separated)</label>

<input type="text" name="tables" placeholder="customers,orders,logs">

<br><br>

<button type="submit">Ask LLM</button>

</form>

{% if result %}

<h3>Tables to Clean:</h3>

<pre>{{ result }}</pre>

{% endif %}

{% endblock %}
